name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      # Trusted Publishing via OIDC requires npm >= 11.5.1. Node 20 ships
      # with npm 10.x, so upgrade the global npm CLI before publishing.
      - run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      - run: bun run test
      - run: npm publish
